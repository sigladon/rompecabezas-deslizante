<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: transparent;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, max-content);
      width: max-content;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      overflow: hidden;
    }
    .cell {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid #f1f5f9;
      word-break: keep-all;
      overflow-wrap: normal;
    }
    .grid > .cell:nth-last-child(-n+6) {
      border-bottom: none;
    }
    .cell.hdr {
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: #f8fafc;
      border-bottom: 2px solid #e2e8f0 !important;
      white-space: nowrap;
    }
    .cell.nodos {
      white-space: normal;
      text-align: center;
      line-height: 1.3;
    }
    .cell.name {
      font-weight: 600;
      color: #0f172a;
      word-break: keep-all;
    }
    .cell.mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      color: #334155;
      white-space: nowrap;
    }
    .cell.action {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.35rem 0.8rem;
      background: #ffffff;
      color: #0f172a;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .btn:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }
    .btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="grid">
    
        <div class='cell hdr'>Algoritmo</div>
        <div class='cell hdr'>Tiempo</div>
        <div class='cell hdr'>Memoria</div>
        <div class='cell hdr nodos'>Nodos<br>explorados</div>
        <div class='cell hdr'>Pasos</div>
        <div class='cell hdr'></div>
    
    
        <div class='cell name'>BFS</div>
        <div class='cell mono'>3.974s</div>
        <div class='cell mono'>34.0 MB</div>
        <div class='cell mono'>95896</div>
        <div class='cell mono'>23</div>
        <div class='cell action'><button class='btn' onclick="selectAlgo('BFS')">Resolución</button></div>
        
        <div class='cell name'>IDDFS</div>
        <div class='cell mono'>25.803s</div>
        <div class='cell mono'>280.6 KB</div>
        <div class='cell mono'>2619064</div>
        <div class='cell mono'>23</div>
        <div class='cell action'><button class='btn' onclick="selectAlgo('IDDFS')">Resolución</button></div>
        
        <div class='cell name'>A* Fuera de lugar</div>
        <div class='cell mono'>0.477s</div>
        <div class='cell mono'>6.1 MB</div>
        <div class='cell mono'>13324</div>
        <div class='cell mono'>23</div>
        <div class='cell action'><button class='btn' onclick="selectAlgo('A* Fuera de lugar')">Resolución</button></div>
        
        <div class='cell name'>A* Manhattan</div>
        <div class='cell mono'>0.055s</div>
        <div class='cell mono'>443.4 KB</div>
        <div class='cell mono'>1573</div>
        <div class='cell mono'>23</div>
        <div class='cell action'><button class='btn' onclick="selectAlgo('A* Manhattan')">Resolución</button></div>
        
  </div>
  <script>
    function selectAlgo(name) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setComponentValue",
        value: name
      }, "*");
    }
    window.addEventListener("load", function() {
      window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1}, "*");
      setTimeout(function() {
        var h = document.body.scrollHeight;
        window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: h + 8}, "*");
      }, 120);
    });
  </script>
</body>
</html>
